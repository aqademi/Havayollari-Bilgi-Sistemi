    const CopyButton = ({ text }) => {
      const [copied, setCopied] = useState(false);

      const handleCopy = async (e) => {
        e.stopPropagation();
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('Failed to copy:', err);
        }
      };

      return (
        <button
          onClick={handleCopy}
          className="p-1.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 group/copy"
          title="Kopyala"
        >
          {copied ? <Icons.Check size={14} className="text-green-500" /> : <Icons.Copy size={14} />}
        </button>
      );
    };

                    <Icons.ChevronRight className="text-slate-300 dark:text-slate-700 group-hover:text-blue-400 transition-colors" size={20} />
                  </div>
                  <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 mb-2 line-clamp-1">{airline.name}</h3>
                  <div className="space-y-2 mt-auto w-full">
                    <div className="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
                      <Icons.Phone size={14} className="text-slate-400 dark:text-slate-600 flex-shrink-0" />
                      <span className="truncate">{airline.phone || 'N/A'}</span>
                    </div>
                    <div className="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
                      <Icons.Mail size={14} className="text-slate-400 dark:text-slate-600 flex-shrink-0" />
                      <span className="truncate">{airline.email || 'N/A'}</span>
                    </div>
                  </div>
                </button>
              ))}
            </div>

            {/* Empty State screen */}
            {filteredAirlines.length === 0 && (
              <div className="text-center py-20 bg-white/50 dark:bg-slate-900/50 rounded-3xl border border-slate-200/60 dark:border-slate-800/60 p-8 shadow-sm">
                <div className="bg-slate-100 dark:bg-slate-900 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Icons.Search size={32} className="text-slate-400 dark:text-slate-600" />
                </div>
                <h3 className="text-lg font-bold text-slate-900 dark:text-white">Havayolu bulunamadı</h3>
                <p className="text-slate-500 dark:text-slate-400 mt-1">Lütfen farklı harfler veya kodlar ile tekrar arayın.</p>
              </div>
            )}
          </main>

          {/* Modal Overlay / Details Popup card */}
          {selectedAirline && (
            <div className="fixed inset-0 z-50 overflow-y-auto">
              <div className="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                
                {/* Backdrop shadow overlay */}
                <div 
                  onClick={() => setSelectedAirline(null)}
                  className="fixed inset-0 bg-slate-900/60 dark:bg-black/80 backdrop-blur-sm transition-opacity" 
                />

                {/* Center elements */}
                <span className="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>

                {/* Modal Container */}
                <div className="inline-block align-bottom bg-white dark:bg-slate-900 rounded-3xl text-left shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-3xl sm:w-full border border-slate-200 dark:border-slate-850 overflow-hidden">
                  
                  <div className="relative p-6 md:p-8 max-h-[85vh] overflow-y-auto">
                    
                    {/* Top closing cross button */}
                    <button
                      onClick={() => setSelectedAirline(null)}
                      className="absolute top-6 right-6 p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 focus:outline-none"
                    >
                      <Icons.X size={24} />
                    </button>

                    {/* Logo and title header */}
                    <div className="flex items-center gap-4 mb-8">
                      <div className="bg-blue-600 text-white px-4 py-2 rounded-2xl text-2xl font-black shadow-lg shadow-blue-200 dark:shadow-none">
                        {selectedAirline.code}
                      </div>
                      <div>
                        <h2 className="text-2xl md:text-3xl font-black text-slate-900 dark:text-white leading-tight">
                          {selectedAirline.name}
                        </h2>
                        <p className="text-blue-600 dark:text-blue-400 font-semibold tracking-wide uppercase text-xs mt-1">Havayolu Detayları</p>
                      </div>
                    </div>

                    {/* Content Columns info space */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                      <div className="space-y-6">
                        <div className="bg-slate-50 dark:bg-slate-800/40 p-5 rounded-2xl border border-slate-100 dark:border-slate-800">
                          <p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">TEL</p>
                          {renderMultiLine(selectedAirline.phone)}
                        </div>
                        <div className="bg-slate-50 dark:bg-slate-800/40 p-5 rounded-2xl border border-slate-100 dark:border-slate-800">
                          <p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">E-POSTA / Mail</p>
                          {renderMultiLine(selectedAirline.email)}
                        </div>
                      </div>

                      <div className="space-y-4">
                        <div className="bg-slate-50 dark:bg-slate-800/40 p-4 rounded-2xl border border-slate-100 dark:border-slate-800">
                          <p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1">İKİLİ KOD</p>
                          <p className="text-lg font-bold text-slate-800 dark:text-slate-200">{selectedAirline.code}</p>
                        </div>
                        <div className="bg-slate-50 dark:bg-slate-800/40 p-4 rounded-2xl border border-slate-100 dark:border-slate-800">
                          <p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1">CEZA KODU</p>
                          <p className="text-lg font-bold text-slate-800 dark:text-slate-200">{selectedAirline.ceza_kodu || '-'}</p>
                        </div>
                        <div className="bg-amber-50 dark:bg-amber-900/10 p-5 rounded-2xl border border-amber-100 dark:border-amber-900/20">
                          <div className="flex items-center gap-2 text-amber-700 dark:text-amber-550 mb-2">
                            <Icons.Clock size={16} />
                            <span className="font-bold text-[10px] uppercase tracking-wider">VOID SÜRESİ</span>
                          </div>
                          <p className="text-slate-850 dark:text-slate-200 font-medium leading-relaxed text-sm">
                            {selectedAirline.void_duration || '-'}
                          </p>
                        </div>
                      </div>
                    </div>

                    {/* Bottom notes information */}
                    <div className="space-y-4">
                      <div className="bg-blue-50 dark:bg-blue-900/10 p-6 rounded-2xl border border-blue-100 dark:border-blue-900/20">
                        <div className="flex items-center gap-2 text-blue-700 dark:text-blue-400 mb-3">
                          <Icons.Info size={20} />
                          <span className="font-bold text-sm uppercase tracking-wider">INVOL BİLGİLERİ / NOT</span>
                        </div>
                        <div className="space-y-4">
                          {selectedAirline.invol_bilgileri && (
                            <div>
                              <p className="text-[10px] font-bold text-blue-400 dark:text-blue-500 uppercase tracking-widest mb-1">INVOL BİLGİLERİ</p>
                              <p className="text-slate-800 dark:text-slate-200 font-medium leading-relaxed">{selectedAirline.invol_bilgileri}</p>
                            </div>
                          )}
                          {selectedAirline.notes && (
                            <div>
                              <p className="text-[10px] font-bold text-blue-400 dark:text-blue-500 uppercase tracking-widest mb-1">NOT</p>
                              <p className="text-slate-800 dark:text-slate-200 font-medium leading-relaxed">{selectedAirline.notes}</p>
                            </div>
                          )}
                          {!selectedAirline.invol_bilgileri && !selectedAirline.notes && (
                            <p className="text-slate-400 dark:text-slate-500 italic">Bilgi bulunmamaktadır.</p>
                          )}
                        </div>
                      </div>
                    </div>

                  </div>

                  {/* Modal bottom closing actions */}
                  <div className="p-6 bg-slate-50 dark:bg-slate-800/40 border-t border-slate-100 dark:border-slate-800 flex justify-end">
                    <button
                      onClick={() => setSelectedAirline(null)}
                      className="px-8 py-3 bg-slate-900 dark:bg-blue-600 text-white font-bold rounded-2xl hover:bg-slate-800 dark:hover:bg-blue-700 transition-all shadow-lg shadow-slate-200 dark:shadow-none focus:outline-none"
                    >
                      Kapat
                    </button>
                  </div>

                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
