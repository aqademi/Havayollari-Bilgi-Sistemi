<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">

        const { motion, AnimatePresence } = window.Motion;

        const CopyButton = ({ text }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = async (e) => {
                e.stopPropagation();
                await navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            return (
                <button onClick={handleCopy} className="p-1.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-400 hover:text-blue-600">
                    {copied ? <i data-lucide="check" style={{width:'14px', height:'14px'}} className="text-green-500"></i> : <i data-lucide="copy" style={{width:'14px', height:'14px'}}></i>}
                </button>
            );
        };

        function App() {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedAirline, setSelectedAirline] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('theme') === 'dark');

            useEffect(() => {
                const root = document.documentElement;
                if (isDarkMode) { root.classList.add('dark'); localStorage.setItem('theme', 'dark'); }
                else { root.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
                setTimeout(() => lucide.createIcons(), 100);
            }, [isDarkMode]);

            useEffect(() => { setTimeout(() => lucide.createIcons(), 100); }, [selectedAirline, searchTerm]);

            const filteredAirlines = useMemo(() => {
                const term = searchTerm.toLowerCase().trim();
                if (!term) return airlinesData;
                return airlinesData.filter(a => a.name.toLowerCase().includes(term) || a.code.toLowerCase().includes(term));
            }, [searchTerm]);

            const renderMultiLine = (text) => {
                if (!text || text === 'N/A' || text === '-') return <span className="text-slate-400">-</span>;
                const items = text.split('/').map(i => i.trim()).filter(Boolean);
                return (
                    <div className="space-y-2">
                        {items.map((item, idx) => (
                            <div key={idx} className="flex items-center justify-between gap-2 bg-white dark:bg-slate-800/50 p-2 rounded-xl border border-slate-100 dark:border-slate-700/50">
                                <span className="text-sm font-medium break-all">{item}</span>
                                <CopyButton text={item} />
                            </div>
                        ))}
                    </div>
                );
            };

                            </div>

                                            <p className="text-sm leading-relaxed"><strong>Not:</strong> {selectedAirline.notes}</p>

                                    </div>

                                    </div>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>

        }
