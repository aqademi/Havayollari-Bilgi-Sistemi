<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Havayolu Bilgi Sistemi - İletişim & Void Kuralları</title>
  
  <!-- Fontlar (Inter & Space Grotesk) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS v4 CDN -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <!-- React & ReactDOM (v18 Yüksek Hızlı production CDN'leri) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone (JSX desteklemek için) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
  <div id="root"></div>

  <!-- React ve Uygulama Yönetimi -->
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- ENTEGRE SVG SİMGE BİLEŞENLERİ ---
    const Icons = {
      Plane: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3.5c-.5-.5-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-.9-.2-1.9.1-2.4.9l-1.1 1.9c-.4.7-.3 1.6.4 2.1l6 4.2-3.6 3.6-2.6-.9c-.7-.2-1.4 0-1.8.6L.4 21c-.3.5-.2 1.1.2 1.4.3.3.9.5 1.4.2l1.9-.9c.5-.3.8-1 .6-1.8l-.9-2.6 3.6-3.6 4.2 6c.5.7 1.3.8 2.1.4l1.9-1.1c.7-.5 1-1.5.9-2.4z"/>
        </svg>
      ),
      Search: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
      ),
      Phone: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      ),
      Mail: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      ),
      Clock: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      ),
      Info: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
        </svg>
      ),
      X: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>
      ),
      ChevronRight: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="m9 18 6-6-6-6"/>
        </svg>
      ),
      Copy: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
        </svg>
      ),
      Check: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      ),
      Moon: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
        </svg>
      ),
      Sun: ({ size = 20, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
        </svg>
      )
    };

    // --- KOPYALAMA BUTONU ---
    const CopyButton = ({ text }) => {
      const [copied, setCopied] = useState(false);

      const handleCopy = async (e) => {
        e.stopPropagation();
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('Kopyalama hatası:', err);
        }
      };

      return (
        <button
          onClick={handleCopy}
          className="p-1.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 shrink-0"
          title="Kopyala"
        >
          {copied ? <Icons.Check size={14} className="text-green-500" /> : <Icons.Copy size={14} />}
        </button>
      );
    };

    // --- ANA UYGULAMA (APP) ---
    function App() {
      const [airlines, setAirlines] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedAirline, setSelectedAirline] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [isDarkMode, setIsDarkMode] = useState(() => {
        if (typeof window !== 'undefined') {
          const saved = localStorage.getItem('theme');
          return saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
        }
        return false;
      });

      // HTML dökümanı yüklenince airlines.json verisini dinamik olarak çek
      useEffect(() => {
        fetch('./airlines.json')
          .then(response => {
            if (!response.ok) throw new Error('Veri çekilemedi');
            return response.json();
          })
          .then(data => {
            setAirlines(data);
            setIsLoading(false);
          })
          .catch(error => {
            console.error('Veritabanı yükleme hatası:', error);
            setIsLoading(false);
          });
      }, []);

      useEffect(() => {
        const root = document.documentElement;
        if (isDarkMode) {
          root.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          root.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [isDarkMode]);

      const filteredAirlines = useMemo(() => {
        const term = searchTerm.toLowerCase().trim();
        if (!term) return airlines;
        return airlines.filter(
          (airline) =>
            airline.name.toLowerCase().includes(term) ||
            airline.code.toLowerCase().includes(term)
        );
      }, [searchTerm, airlines]);

      const renderMultiLine = (text) => {
        if (!text || text === 'N/A' || text === '-') {
          return <span className="text-slate-400 dark:text-slate-600">-</span>;
        }
        const items = text.split('/').map(item => item.trim()).filter(Boolean);
        return (
          <div className="space-y-2">
            {items.map((item, idx) => (
              <div key={idx} className="flex items-center justify-between gap-3 bg-white dark:bg-slate-800/50 p-2 rounded-xl border border-slate-100 dark:border-slate-700/50">
                <span className="text-sm font-semibold text-slate-700 dark:text-slate-300 break-all">{item}</span>
                <CopyButton text={item} />
              </div>
            ))}
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-950 font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">
          {/* Header */}
          <header className="sticky top-0 z-30 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div className="flex items-center justify-between w-full md:w-auto">
                  <div className="flex items-center gap-3">
                    <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg">
                      <Icons.Plane size={24} />
                    </div>
                    <div>
                      <h1 className="text-xl font-black tracking-tight text-slate-900 dark:text-white font-['Space_Grotesk']">Havayolu Bilgi Sistemi</h1>
                      <p className="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest">İletişim & Void Kuralları</p>
                    </div>
                  </div>
                  
                  <button
                    onClick={() => setIsDarkMode(!isDarkMode)}
                    className="md:hidden p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all cursor-pointer"
                  >
                    {isDarkMode ? <Icons.Sun size={20} /> : <Icons.Moon size={20} />}
                  </button>
                </div>

                <div className="flex items-center gap-3 flex-1 lg:max-w-xl md:max-w-md w-full">
                  <div className="relative flex-1">
                    <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                      <Icons.Search className="h-5 w-5 text-slate-400" />
                    </div>
                    <input
                      type="text"
                      className="block w-full pl-11 pr-4 py-3 border border-slate-200 dark:border-slate-800 rounded-2xl leading-5 bg-slate-50 dark:bg-slate-800 placeholder-slate-400 dark:placeholder-slate-500 text-slate-900 dark:text-white focus:outline-none focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all shadow-inner"
                      placeholder="Havayolu adı veya ikili kod (örn: TK, Pegasus)..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                  </div>
                  
                  <button
                    onClick={() => setIsDarkMode(!isDarkMode)}
                    className="hidden md:flex p-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all cursor-pointer"
                  >
                    {isDarkMode ? <Icons.Sun size={20} /> : <Icons.Moon size={20} />}
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {isLoading ? (
              <div className="flex flex-col items-center justify-center py-40">
                <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p className="text-slate-500 font-medium">Veritabanı yükleniyor...</p>
              </div>
            ) : (
              <>
                <div className="mb-6">
                  <h2 className="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">
                    {filteredAirlines.length} Havayolu Bulundu
                  </h2>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                  {filteredAirlines.map((airline) => (
                    <div
                      key={airline.code}
                      onClick={() => setSelectedAirline(airline)}
                      className="flex flex-col text-left bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-xl dark:hover:shadow-blue-900/10 hover:border-blue-200 dark:hover:border-blue-900/50 transition-all duration-300 transform hover:-translate-y-1 cursor-pointer group"
                    >
                      <div className="flex items-start justify-between mb-4">
                        <span className="inline-flex items-center justify-center px-3 py-1 rounded-lg bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 text-sm font-black border border-blue-100 dark:border-blue-900/30 font-['Space_Grotesk']">
                          {airline.code}
                        </span>
                        <Icons.ChevronRight className="text-slate-300 dark:text-slate-700 group-hover:text-blue-500 transition-colors" size={20} />
                      </div>
                      <h3 className="text-base font-bold text-slate-800 dark:text-slate-100 mb-4 line-clamp-1 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">{airline.name}</h3>
                      <div className="space-y-2.5 mt-auto">
                        <div className="flex items-center gap-2.5 text-xs text-slate-500 dark:text-slate-400">
                          <Icons.Phone size={14} className="text-slate-400 dark:text-slate-600 shrink-0" />
                          <span className="truncate">{airline.phone || 'N/A'}</span>
                        </div>
                        <div className="flex items-center gap-2.5 text-xs text-slate-500 dark:text-slate-400">
                          <Icons.Mail size={14} className="text-slate-400 dark:text-slate-600 shrink-0" />
                          <span className="truncate">{airline.email || 'N/A'}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                {filteredAirlines.length === 0 && (
                  <div className="text-center py-20 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 p-8">
                    <div className="bg-slate-100 dark:bg-slate-800 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                      <Icons.Search size={32} className="text-slate-400 dark:text-slate-600" />
                    </div>
                    <h3 className="text-lg font-bold text-slate-900 dark:text-white">Havayolu bulunamadı</h3>
                    <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">Lütfen farklı harfler veya kodlar ile tekrar arayın.</p>
                  </div>
                )}
              </>
            )}
          </main>

          {/* Kolay ve Hızlı Detay Modülü */}
          {selectedAirline && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div 
                onClick={() => setSelectedAirline(null)}
                className="fixed inset-0 bg-slate-950/65 backdrop-blur-sm transition-opacity"
              />
              
              <div className="relative w-full max-w-2xl bg-white dark:bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800 flex flex-col max-h-[90vh]">
                <div className="p-6 md:p-8 overflow-y-auto">
                  <button
                    onClick={() => setSelectedAirline(null)}
                    className="absolute top-6 right-6 p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 cursor-pointer"
                  >
                    <Icons.X size={20} />
                  </button>

                  <div className="flex items-center gap-4 mb-8">
                    <div className="bg-blue-600 text-white px-4 py-2 rounded-2xl text-2xl font-black font-['Space_Grotesk']">
                      {selectedAirline.code}
                    </div>
                    <div>
                      <h2 className="text-xl md:text-2xl font-black text-slate-900 dark:text-white leading-tight font-['Space_Grotesk']">
                        {selectedAirline.name}
                      </h2>
                      <p className="text-blue-600 dark:text-blue-400 font-bold tracking-widest uppercase text-[10px] mt-1">Havayolu Detayları</p>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div className="space-y-6">
                      <div className="bg-slate-50 dark:bg-slate-800/40 p-5 rounded-2xl border border-slate-100 dark:border-slate-800">
                        <p className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3 font-['Space_Grotesk']">TELEFON NUMARASI</p>
                        {renderMultiLine(selectedAirline.phone)}
                      </div>
                      <div className="bg-slate-50 dark:bg-slate-800/40 p-5 rounded-2xl border border-slate-100 dark:border-slate-800">
                        <p className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3 font-['Space_Grotesk']">E-POSTA / MAIL</p>
                        {renderMultiLine(selectedAirline.email)}
                      </div>
                    </div>

                    <div className="space-y-4">
                      <div className="bg-slate-50 dark:bg-slate-800/40 p-4 rounded-2xl border border-slate-100 dark:border-slate-800 flex justify-between items-center">
                        <div>
                          <p className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1 font-['Space_Grotesk']">İKİLİ KOD</p>
                          <p className="text-base font-extrabold text-slate-800 dark:text-slate-200">{selectedAirline.code}</p>
                        </div>
                        <CopyButton text={selectedAirline.code} />
                      </div>
                      <div className="bg-slate-50 dark:bg-slate-800/40 p-4 rounded-2xl border border-slate-100 dark:border-slate-800 flex justify-between items-center">
                        <div>
                          <p className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1 font-['Space_Grotesk']">CEZA KODU</p>
                          <p className="text-base font-extrabold text-slate-800 dark:text-slate-200">{selectedAirline.ceza_kodu || '-'}</p>
                        </div>
                        {selectedAirline.ceza_kodu && selectedAirline.ceza_kodu !== '-' && <CopyButton text={selectedAirline.ceza_kodu} />}
                      </div>
                      <div className="bg-amber-50 dark:bg-amber-900/10 p-5 rounded-2xl border border-amber-100 dark:border-amber-900/20">
                        <div className="flex items-center gap-2 text-amber-700 dark:text-amber-500 mb-2">
                          <Icons.Clock size={16} />
                          <span className="font-extrabold text-[10px] uppercase tracking-widest font-['Space_Grotesk']">VOID SÜRESİ</span>
                        </div>
                        <p className="text-slate-800 dark:text-slate-200 font-bold leading-relaxed text-sm">
                          {selectedAirline.void_duration || '-'}
                        </p>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <div className="bg-blue-50 dark:bg-blue-900/10 p-6 rounded-2xl border border-blue-100 dark:border-blue-900/20">
                      <div className="flex items-center gap-2 text-blue-700 dark:text-blue-400 mb-4 font-['Space_Grotesk']">
                        <Icons.Info size={20} />
                        <span className="font-black text-xs uppercase tracking-widest">INVOL BİLGİLERİ & ACENTE NOTU</span>
                      </div>
                      <div className="space-y-4 text-sm divide-y divide-blue-100/30 dark:divide-blue-900/20">
                        {selectedAirline.invol_bilgileri && selectedAirline.invol_bilgileri !== 'N/A' ? (
                          <div className="pt-1">
                            <p className="text-[10px] font-black text-blue-400 dark:text-blue-500 uppercase tracking-widest mb-1 font-['Space_Grotesk']">INVOL BİLGİSİ</p>
                            <p className="text-slate-800 dark:text-slate-200 font-medium leading-relaxed">{selectedAirline.invol_bilgileri}</p>
                          </div>
                        ) : null}
                        {selectedAirline.notes ? (
                          <div className="pt-3">
                            <p className="text-[10px] font-black text-blue-400 dark:text-blue-500 uppercase tracking-widest mb-1 font-['Space_Grotesk']">NOTLAR</p>
                            <p className="text-slate-800 dark:text-slate-200 font-medium leading-relaxed">{selectedAirline.notes}</p>
                          </div>
                        ) : null}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="mt-auto p-6 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-850 flex justify-end">
                  <button
                    onClick={() => setSelectedAirline(null)}
                    className="px-8 py-3 bg-slate-900 dark:bg-blue-600 text-white font-bold rounded-2xl hover:bg-slate-800 dark:hover:bg-blue-700 transition-all cursor-pointer shadow-lg active:scale-95"
                  >
                    Kapat
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
