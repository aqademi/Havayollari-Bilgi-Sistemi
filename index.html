                                    <div className="flex items-center gap-4 mb-6">
                                        <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center text-2xl font-black">{selected.code}</div>
                                        <h2 className="text-2xl font-black leading-tight">{selected.name}</h2>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            {renderField("Telefon", selected.phone)}
                                            {renderField("E-Posta", selected.email)}
                                        </div>
                                        <div className="space-y-4">
                                            <div className="bg-amber-500/10 p-4 rounded-2xl border border-amber-500/20">
                                                <p className="text-[10px] font-bold text-amber-500 uppercase mb-1">Void Süresi</p>
                                                <p className="text-xs font-bold">{selected.void_duration}</p>
                                            </div>
                                            <div className="bg-blue-500/10 p-4 rounded-2xl border border-blue-500/20">
                                                <p className="text-[10px] font-bold text-blue-500 uppercase mb-1">Ceza Kodu</p>
                                                <p className="text-lg font-black">{selected.ceza_kodu || "-"}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-6 space-y-4">
                                        <div className="bg-slate-900 p-4 rounded-2xl">
                                            <h4 className="font-bold text-xs mb-2 text-blue-500 uppercase">Invol Bilgileri</h4>
                                            <p className="text-xs leading-relaxed text-slate-400">{selected.invol_bilgileri}</p>
                                        </div>
                                        <div className="bg-slate-900 p-4 rounded-2xl">
                                            <h4 className="font-bold text-xs mb-2 text-amber-500 uppercase">Notlar</h4>
                                            <p className="text-xs leading-relaxed text-slate-400">{selected.notes}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-4 border-t border-slate-800 flex justify-end">
                                    <button onClick={() => setSelected(null)} className="bg-blue-600 px-8 py-2 rounded-xl font-black text-sm">KAPAT</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
